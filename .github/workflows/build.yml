name: Build and Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '10.0'

    - name: Restore dependencies
      run: dotnet restore ./DemoApi/DemoApi.csproj

    - name: Build
      run: dotnet build ./DemoApi/DemoApi.csproj --configuration Release --no-restore

    - name: Publish
      run: dotnet publish ./DemoApi/DemoApi.csproj -c Release -o publish

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: my-demo-api-123
        package: ./DemoApi/publish/
